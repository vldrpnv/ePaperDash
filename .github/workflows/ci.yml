name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-desktop-service:
    name: Desktop dashboard service – pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev extras
        run: pip install -e "services/desktop_dashboard_service[dev]"

      - name: Run tests
        run: pytest -q services/desktop_dashboard_service/tests
