<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="white" />

  <!-- ═══════════════ LEFT CONTEXT RAIL (x 0–182) ═══════════════ -->

  <!-- Calendar: compact two-line date (day-of-week / day month).
       y=32 places the baseline so the ascenders of the first line stay on-screen
       (top of text ≈ y − 0.75 × font-size ≈ 32 − 21 = 11 px).
       Explicit font-size in renderer_config takes precedence over auto-fit. -->
  <text id="calendar" x="8" y="32" font-family="Arial, sans-serif" fill="black"
        data-bbox-width="168" data-bbox-height="68" />

  <!-- Analog validity-window clock: secondary, quiet — communicates freshness only.
       size_px=140 in renderer_config keeps the label legible while freeing
       lower rail space for waste-collection lines. -->
  <image id="analog_clock" x="14" y="100" width="154" height="174" />

  <!-- Waste collection moves into the lower rail so the main area can use one
       flexible multi-day Google Calendar block. -->
  <text id="waste" x="8" y="304" font-family="Arial, sans-serif" fill="black"
        data-bbox-width="168" data-bbox-height="60" />

  <!-- Mascot / decorative image: reduced so it can share the lower rail. -->
  <image id="image_pool" x="28" y="374" width="120" height="106" />

  <!-- ═══════════════ MAIN CONTENT AREA (x 188–800) ═══════════════ -->

  <!-- Weather block: primary visual anchor at the top of the main area.
       Slightly shorter to free room for a flexible calendar block plus trains.
       Composited at runtime; x/y/width/height are read by the application service
       and injected into the weather_block renderer_config. -->
  <image id="weather_block" x="188" y="6" width="606" height="168" />

  <!-- Bold separator between weather and the lower information zone. -->
  <line x1="192" y1="182" x2="794" y2="182" stroke="#444" stroke-width="2" />

  <!-- Google Calendar: one renderer-managed image block that can rebalance
       events across a configurable number of displayed days. -->
  <image id="gcal_events" x="196" y="198" width="596" height="124" />

  <!-- Train icon: Phosphor Icons "train" (MIT), viewBox 0 0 256 256.
       Reduced and moved to the lower full-width timetable row. -->
  <path transform="translate(196,334) scale(0.17)"
        fill="black"
        d="M184 24H72a32 32 0 0 0-32 32v128a32 32 0 0 0 72 32h8l-14.4 19.2a8 8 0 1 0 12.8 9.6L100 216h56l21.6 28.8a8 8 0 1 0 12.8-9.6L176 216h8a32 32 0 0 0 32-32V56a32 32 0 0 0-32-32M56 120V80h64v40Zm80-40h64v40h-64ZM72 40h112a16 16 0 0 1 16 16v8H56v-8a16 16 0 0 1 16-16m112 160H72a16 16 0 0 1-16-16v-48h144v48a16 16 0 0 1-16 16m-88-28a12 12 0 1 1-12-12a12 12 0 0 1 12 12m88 0a12 12 0 1 1-12-12a12 12 0 0 1 12 12"/>

  <!-- Trains: left portion of the lower timetable row (narrowed to share with Trello). -->
  <text id="trains" x="244" y="340" font-family="Arial, sans-serif" fill="black"
        data-bbox-width="280" data-bbox-height="130" />

  <!-- Vertical divider between trains and Trello. -->
  <line x1="534" y1="334" x2="534" y2="476" stroke="#444" stroke-width="1" />

  <!-- Trello board: lower-right corner, lists cards grouped by column. -->
  <text id="trello" x="542" y="340" font-family="Arial, sans-serif" fill="black"
        data-bbox-width="250" data-bbox-height="130" />

</svg>
