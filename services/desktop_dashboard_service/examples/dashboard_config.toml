[layout]
template = "layout.svg"
preview_output = "dashboard_preview.png"
width = 800
height = 480

[service]
interval_seconds = 150

[mqtt]
host = "localhost"
port = 1883
topic = "epaper/image"
client_id = "desktop-dashboard-service"
retain = true
qos = 1
publish_retry_attempts = 3
publish_retry_delay_seconds = 1.0

[[panels]]
source = "calendar"
renderer = "calendar_text"
slot = "calendar"
[panels.source_config]
timezone = "Europe/Berlin"
day_of_week_format = "%A"
month_format = "%B"
[panels.renderer_config]
font-size = "28"
font-weight = "700"

[[panels]]
source = "weather_forecast"
renderer = "weather_block"
slot = "weather_block"
[panels.source_config]
provider = "open_meteo"
location_name = "Eichenau"
latitude = 48.167
longitude = 11.317
timezone = "Europe/Berlin"
forecast_days = 5
precision_hours = 1
[panels.renderer_config]
icon_size_factor = "0.7"
tomorrow_icon_size_factor = "1.2"
precip_prob_threshold = "0"
precip_mm_threshold = "0"

[[panels]]
source = "clock"
renderer = "analog_clock"
slot = "analog_clock"
[panels.source_config]
timezone = "Europe/Berlin"
[panels.renderer_config]
validity_window_minutes = "5"
window_start_mode = "start_at_next_minute"
label_mode = "approx"
sector_style = "end_hand"
show_hour_hand = "true"
show_tick_marks = "true"
size_px = "72"

[[panels]]
source = "mvg_departures"
renderer = "train_departures_text"
slot = "trains"
[panels.source_config]
station_name = "Eichenau"
limit = 5
timezone = "Europe/Berlin"
[panels.renderer_config]
font-family = "Arial, sans-serif"
fill = "black"
departure-font-size = "18"

[[panels]]
source = "random_image"
renderer = "random_image"
slot = "image_pool"
[panels.source_config]
directory = "./image_samples"
[panels.renderer_config]
