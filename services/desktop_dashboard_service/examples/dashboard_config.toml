[layout]
template = "layout.svg"
preview_output = "dashboard_preview.png"
width = 800
height = 480

[service]
interval_seconds = 150

[mqtt]
host = "localhost"
port = 1883
topic = "epaper/image"
client_id = "desktop-dashboard-service"
retain = true
qos = 1
publish_retry_attempts = 3
publish_retry_delay_seconds = 1.0

[[panels]]
source = "calendar"
renderer = "calendar_text"
slot = "calendar"
[panels.source_config]
timezone = "Europe/Berlin"
day_of_week_format = "%A"
month_format = "%B"
[panels.renderer_config]
font-size = "26"
font-weight = "700"

[[panels]]
source = "weather_forecast"
renderer = "weather_block"
slot = "weather_block"
[panels.source_config]
provider = "open_meteo"
location_name = "Eichenau"
latitude = 48.167
longitude = 11.317
timezone = "Europe/Berlin"
forecast_days = 5
precision_hours = 1
[panels.renderer_config]
icon_size_factor = "0.5"
tomorrow_icon_size_factor = "1.0"
precip_prob_threshold = "0"
precip_mm_threshold = "0"

[[panels]]
source = "clock"
renderer = "analog_clock"
slot = "analog_clock"
[panels.source_config]
timezone = "Europe/Berlin"
[panels.renderer_config]
validity_window_minutes = "5"
window_start_mode = "start_at_next_minute"
label_mode = "approx"
sector_style = "end_hand"
show_hour_hand = "true"
show_tick_marks = "false"
show_face = "true"
size_px = "154"

[[panels]]
source = "google_calendar"
renderer = "google_calendar_text"
slot = "gcal_events"
[panels.source_config]
# ${gcal_url} is substituted from secrets.toml when --secrets is passed to the CLI.
# See secrets.toml.tmpl for the expected format.
calendar_url = "${gcal_url}"
timezone = "Europe/Berlin"
# Keep the calendar list short enough to leave readable space for waste below it.
max_events = 5
# Optional title filters for hidden/private events:
# blacklist_terms = ["Focus time", "School holiday"]
# filter_word = "Private"
[panels.renderer_config]
font-family = "Arial, sans-serif"
font-size = "16"
fill = "black"

[[panels]]
source = "ffb_waste_collection"
renderer = "waste_collection_text"
slot = "waste"
[panels.source_config]
# ${waste_address} is substituted from secrets.toml when --secrets is passed to the CLI.
address = "${waste_address}"
timezone = "Europe/Berlin"
[panels.renderer_config]
font-family = "Arial, sans-serif"
font-size = "16"
tomorrow-font-size = "20"
fill = "black"

[[panels]]
source = "mvg_departures"
renderer = "train_departures_text"
slot = "trains"
[panels.source_config]
station_name = "Eichenau"
limit = 5
timezone = "Europe/Berlin"
[panels.renderer_config]
font-family = "Arial, sans-serif"
font-size = "20"
fill = "black"
show-line = "false"
station-name-font-size = "26"
departure-font-size = "20"
departure-break-dy = "1.4em"

[[panels]]
source = "random_image"
renderer = "random_image"
slot = "image_pool"
[panels.source_config]
directory = "./image_samples"
[panels.renderer_config]
