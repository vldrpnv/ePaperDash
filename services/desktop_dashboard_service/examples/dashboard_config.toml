[layout]
template = "layout.svg"
preview_output = "dashboard_preview.png"
width = 800
height = 480

[service]
interval_seconds = 300

[mqtt]
host = "localhost"
port = 1883
topic = "epaper/image"
client_id = "desktop-dashboard-service"
retain = true
qos = 1

[[panels]]
source = "calendar"
renderer = "calendar_text"
slot = "calendar"
[panels.source_config]
timezone = "UTC"
day_of_week_format = "%A"
month_format = "%B"
[panels.renderer_config]
font-size = "48"
font-weight = "700"

[[panels]]
source = "weather_forecast"
renderer = "weather_text"
slot = "weather"
[panels.source_config]
location_name = "Berlin"
latitude = 52.52
longitude = 13.41
timezone = "Europe/Berlin"
[panels.renderer_config]
font-size = "34"

[[panels]]
source = "random_image"
renderer = "random_image"
slot = "image_pool"
[panels.source_config]
directory = "./image_samples"
[panels.renderer_config]
x = 480
y = 20
width = 300
height = 200
