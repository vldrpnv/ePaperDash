[layout]
preview_output = "dashboard_preview.png"
width = 800
height = 480

[service]
interval_seconds = 150

[mqtt]
host = "localhost"
port = 1883
topic = "epaper/image"
client_id = "desktop-dashboard-service"
retain = true
qos = 1
publish_retry_attempts = 3
publish_retry_delay_seconds = 1.0

# ---------------------------------------------------------------------------
# SHARED SOURCES
# ---------------------------------------------------------------------------
[[sources]]
id = "src_calendar"
source = "calendar"
[sources.source_config]
timezone = "Europe/Berlin"
day_of_week_format = "%A"
month_format = "%B"

[[sources]]
id = "src_weather"
source = "weather_forecast"
[sources.source_config]
provider = "open_meteo"
location_name = "Eichenau"
latitude = 48.167
longitude = 11.317
timezone = "Europe/Berlin"
forecast_days = 5
precision_hours = 1

[[sources]]
id = "src_clock"
source = "clock"
[sources.source_config]
timezone = "Europe/Berlin"

[[sources]]
id = "src_gcal"
source = "google_calendar"
[sources.source_config]
calendar_url = "${gcal_url}"
timezone = "Europe/Berlin"
days = 3
max_events = 24

[[sources]]
id = "src_waste"
source = "ffb_waste_collection"
[sources.source_config]
address = "${waste_address}"
timezone = "Europe/Berlin"
waste_types = [
    "Biotonne 60–240 Liter",
    "Restmülltonne 40-240 Liter",
    "Papiertonne 4-wöchentlich",
    "Wertstofftonne 80-1100 Liter",
]

[[sources]]
id = "src_trains"
source = "mvg_departures"
[sources.source_config]
station_name = "Eichenau"
limit = 5
timezone = "Europe/Berlin"

[[sources]]
id = "src_images"
source = "random_image"
[sources.source_config]
directory = "./image_samples"

[[sources]]
id = "src_trello"
source = "trello_cards"
[sources.source_config]
api_key  = "${trello_api_key}"
token    = "${trello_token}"
board_id = "qUD5teDv"
list_names = ["Diese Woche", "In Arbeit"]
max_cards = 10


# ---------------------------------------------------------------------------
# TIME-OF-DAY PROFILES
# ---------------------------------------------------------------------------

# MORNING (00:00 - 08:59)
[[profiles]]
id = "morning"
start_time = "00:00"
template = "layout_morning.svg"

    [[profiles.panels]]
    source_id = "src_calendar"
    renderer = "calendar_text"
    slot = "calendar"
    [profiles.panels.renderer_config]
    font-size = "26"
    font-weight = "700"

    [[profiles.panels]]
    source_id = "src_weather"
    renderer = "weather_block"
    slot = "weather_block"
    [profiles.panels.renderer_config]
    icon_size_factor = "0.5"
    tomorrow_icon_size_factor = "1.0"
    precip_prob_threshold = "0"
    precip_mm_threshold = "0"

    [[profiles.panels]]
    source_id = "src_clock"
    renderer = "analog_clock"
    slot = "analog_clock"
    [profiles.panels.renderer_config]
    validity_window_minutes = "5"
    window_start_mode = "start_at_next_minute"
    label_mode = "approx"
    sector_style = "end_hand"
    show_hour_hand = "true"
    show_tick_marks = "false"
    show_face = "true"
    size_px = "140"

    [[profiles.panels]]
    source_id = "src_gcal"
    renderer = "google_calendar_text"
    slot = "gcal_events"
    [profiles.panels.renderer_config]
    font-size = "14"
    header-font-size = "16"
    max-total-events = "16"
    soft-day-limit = "5"

    [[profiles.panels]]
    source_id = "src_waste"
    renderer = "waste_collection_text"
    slot = "waste"
    [profiles.panels.renderer_config]
    font-family = "Arial, sans-serif"
    font-size = "13"
    tomorrow-font-size = "15"
    fill = "black"

    [[profiles.panels]]
    source_id = "src_trains"
    renderer = "train_departures_text"
    slot = "trains"
    [profiles.panels.renderer_config]
    font-family = "Arial, sans-serif"
    font-size = "16"
    fill = "black"
    show-line = "false"
    station-name-font-size = "20"
    departure-font-size = "16"
    departure-break-dy = "1.4em"

    [[profiles.panels]]
    source_id = "src_images"
    renderer = "random_image"
    slot = "image_pool"
    [profiles.panels.renderer_config]

    [[profiles.panels]]
    source_id = "src_trello"
    renderer = "trello_cards_text"
    slot = "trello"
    [profiles.panels.renderer_config]
    font-size   = "14"
    font-family = "Arial, sans-serif"
    fill        = "black"


