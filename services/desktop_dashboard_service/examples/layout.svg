<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="white" />
  <text id="calendar" x="50" y="110" font-family="Arial, sans-serif" font-size="48" fill="black" />
  <line x1="40" y1="150" x2="760" y2="150" stroke="black" stroke-width="2" />
  <text id="weather" x="50" y="220" font-family="Arial, sans-serif" font-size="34" fill="black" />
  <line x1="40" y1="300" x2="760" y2="300" stroke="black" stroke-width="2" />
  <!-- trains slot: bounding box 720×170 px; font-size is auto-calculated to fit -->
