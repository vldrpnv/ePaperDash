<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="white" />

  <!-- ═══════════════ GRID STRUCTURE ═══════════════ -->

  <!-- Vertical separator: left context rail (x 0–182) | main content area (x 188–800) -->
  <line x1="182" y1="0" x2="182" y2="480" stroke="black" stroke-width="1" />

  <!-- Horizontal separators within the left rail -->
  <line x1="8" y1="96" x2="174" y2="96" stroke="black" stroke-width="1" />
  <line x1="8" y1="214" x2="174" y2="214" stroke="black" stroke-width="1" />

  <!-- Horizontal separator in the main area: weather (top) | transport (bottom) -->
  <line x1="188" y1="295" x2="796" y2="295" stroke="black" stroke-width="1" />

  <!-- ═══════════════ LEFT CONTEXT RAIL (x 0–182) ═══════════════ -->

  <!-- Calendar: compact two-line date (day-of-week / day month), auto-sized to bbox.
       Explicit font-size in renderer_config takes precedence over the auto-fit. -->
  <text id="calendar" x="8" y="12" font-family="Arial, sans-serif" fill="black"
        data-bbox-width="166" data-bbox-height="78" />

  <!-- Analog validity-window clock: secondary, quiet — communicates freshness only.
       Centred in the rail (x 54–136 for an ~80 px face).  size_px=72 in renderer_config. -->
  <image id="analog_clock" x="54" y="102" width="82" height="108" />

  <!-- Mascot / decorative image: small, anchored below the clock. -->
  <image id="image_pool" x="17" y="220" width="148" height="158" />

  <!-- ═══════════════ MAIN CONTENT AREA (x 188–800) ═══════════════ -->

  <!-- Weather block: primary visual anchor at the top of the main area.
       Composited at runtime; x/y/width/height are read by the application service
       and injected into the weather_block renderer_config. -->
  <image id="weather_block" x="188" y="6" width="606" height="285" />

  <!-- Train icon: Phosphor Icons "train" (MIT), viewBox 0 0 256 256.
       Transform: translate(184,295) scale(0.2) places the icon top-left at ≈(192,300),
       giving an ~35×46 px icon that aligns with the timetable text to its right. -->
  <path transform="translate(184,295) scale(0.2)"
        fill="black"
        d="M184 24H72a32 32 0 0 0-32 32v128a32 32 0 0 0 72 32h8l-14.4 19.2a8 8 0 1 0 12.8 9.6L100 216h56l21.6 28.8a8 8 0 1 0 12.8-9.6L176 216h8a32 32 0 0 0 32-32V56a32 32 0 0 0-32-32M56 120V80h64v40Zm80-40h64v40h-64ZM72 40h112a16 16 0 0 1 16 16v8H56v-8a16 16 0 0 1 16-16m112 160H72a16 16 0 0 1-16-16v-48h144v48a16 16 0 0 1-16 16m-88-28a12 12 0 1 1-12-12a12 12 0 0 1 12 12m88 0a12 12 0 1 1-12-12a12 12 0 0 1 12 12"/>

  <!-- Trains: timetable-style, aligned columns (line · time · destination).
       x=232 leaves room for the train icon; auto-sized to bbox. -->
  <text id="trains" x="232" y="308" font-family="Arial, sans-serif" fill="black"
        data-bbox-width="556" data-bbox-height="166" />

</svg>
