<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="white" />
  <text id="calendar" x="50" y="110" font-family="Arial, sans-serif" font-size="48" fill="black" />
  <line x1="40" y1="185" x2="455" y2="185" stroke="black" stroke-width="2" />
  <text id="weather" x="50" y="250" font-family="Arial, sans-serif" font-size="34" fill="black" />
  <!-- Image slot: composited at runtime from the random_image panel -->
  <image id="image_pool" x="480" y="20" width="300" height="250" />
  <line x1="40" y1="295" x2="760" y2="295" stroke="black" stroke-width="2" />
  <!-- Trains slot: bounding box 720×175 px; font-size is auto-calculated to fit -->
  <text id="trains" x="40" y="315" font-family="Arial, sans-serif" fill="black"
        data-bbox-width="720" data-bbox-height="155" />
</svg>
