<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="white" />

  <!-- ═══════════════ LEFT COLUMN (x 0–300) ═══════════════ -->

  <!-- Calendar: baseline y=42 keeps first line on screen even when auto-font is large -->
  <text id="calendar" x="8" y="42" font-family="Arial, sans-serif" font-size="22" fill="black"
        data-bbox-width="284" data-bbox-height="90" />

  <!-- Analog validity-window clock: below calendar, left rail -->
  <image id="analog_clock" x="8" y="145" width="100" height="120" />

  <!-- Train icon: Phosphor Icons "train" (MIT), viewBox 0 0 256 256, scaled to ~40×50 px.
       Transform: translate(-3,280) scale(0.227) positions left edge at x≈6, top at y≈285. -->
  <path transform="translate(-3,280) scale(0.2)"
        fill="black"
        d="M184 24H72a32 32 0 0 0-32 32v128a32 32 0 0 0 72 32h8l-14.4 19.2a8 8 0 1 0 12.8 9.6L100 216h56l21.6 28.8a8 8 0 1 0 12.8-9.6L176 216h8a32 32 0 0 0 32-32V56a32 32 0 0 0-32-32M56 120V80h64v40Zm80-40h64v40h-64ZM72 40h112a16 16 0 0 1 16 16v8H56v-8a16 16 0 0 1 16-16m112 160H72a16 16 0 0 1-16-16v-48h144v48a16 16 0 0 1-16 16m-88-28a12 12 0 1 1-12-12a12 12 0 0 1 12 12m88 0a12 12 0 1 1-12-12a12 12 0 0 1 12 12"/>

  <!-- Trains: x=52 leaves room for the icon; auto-sized to bbox; station name + timetable rows -->
  <text id="trains" x="64" y="300" font-family="Arial, sans-serif" fill="black"
        data-bbox-width="236" data-bbox-height="175" />

  <!-- ═══════════════ RIGHT COLUMN (x 310–800, 490 px wide) ═══════════════ -->

  <!-- Image slot: top-right corner -->
  <image id="image_pool" x="590" y="10" width="200" height="148" />

  <!-- Weather block: right column, composited at runtime -->
  <image id="weather_block" x="310" y="163" width="482" height="312" />

</svg>
